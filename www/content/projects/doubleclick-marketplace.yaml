      - text: For this prototype, it was important to show off animations, such as, accordion-style table rows and material cards.
      - text: Testing was to begin the following week when I was brought into this project, so I only had 3 days to complete the first iteration. I was able to do this by building a prototype that includes both static and interactive mocks. This took a lot of collaboration with the designer and researcher to decide what features had the highest priority and therefore required coding.

