  - partial: section
    title: Challenges
    paragraphs:
      - text: Because RichMediaGallery.com is kept by a separate team while our team wanted to be able to update content as needed without going through a middle man. To do this, I used Firebase to house all of the content so that no one would need to update code to make changes or additions.
      - text: Angular has a handy built in filtering system, but this app required you to be able to filter categories and the items within the categories within the same search bar which required a bit of custom code.

